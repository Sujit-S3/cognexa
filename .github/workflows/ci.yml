name: CI

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  quality:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    env:
      APP_ENV: test
      NODE_ENV: test
      MONGODB_ATLAS_URI: mongodb://localhost:27017/cognexa-test
      SECRET_KEY: test-secret-key-that-is-at-least-32-characters-long
      CLIENT_URL: http://localhost:4173
      CORS_ALLOWED_ORIGINS: http://localhost:4173
      LOG_LEVEL: silent
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm env:validate
      - run: pnpm db:migrate:validate
      - run: pnpm quality
      - run: pnpm security:audit
      - run: pnpm --filter web exec playwright install --with-deps chromium
      - run: pnpm test:e2e
      - name: Upload browser test evidence
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: |
            web/playwright-report
            web/test-results
          if-no-files-found: ignore
          retention-days: 14

  infrastructure:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: azure/setup-kubectl@v4
        with:
          version: v1.31.0
      - name: Render and validate staging manifests
        run: |
          kubectl kustomize deploy/k8s/overlays/staging > "${RUNNER_TEMP}/staging.yaml"
          kubectl apply --dry-run=client --validate=false -f "${RUNNER_TEMP}/staging.yaml"
      - name: Render and validate production manifests
        run: |
          kubectl kustomize deploy/k8s/overlays/production > "${RUNNER_TEMP}/production.yaml"
          kubectl apply --dry-run=client --validate=false -f "${RUNNER_TEMP}/production.yaml"

  containers:
    needs: quality
    runs-on: ubuntu-latest
    timeout-minutes: 25
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - name: Build API image
        run: |
          docker buildx build --load --file docker/server.Dockerfile \
            --build-arg APP_VERSION=ci --build-arg COMMIT_SHA=${{ github.sha }} \
            --tag cognexa-server:${{ github.sha }} .
      - name: Build web image
        run: |
          docker buildx build --load --file docker/web.Dockerfile \
            --build-arg APP_VERSION=ci --build-arg COMMIT_SHA=${{ github.sha }} \
            --build-arg VITE_API_URL=/api/v1 \
            --tag cognexa-web:${{ github.sha }} .
      - name: Scan API image for critical vulnerabilities
        run: |
          docker run --rm -v /var/run/docker.sock:/var/run/docker.sock \
            aquasec/trivy:0.58.2 image --ignore-unfixed --exit-code 1 \
            --severity CRITICAL cognexa-server:${{ github.sha }}
      - name: Scan web image for critical vulnerabilities
        run: |
          docker run --rm -v /var/run/docker.sock:/var/run/docker.sock \
            aquasec/trivy:0.58.2 image --ignore-unfixed --exit-code 1 \
            --severity CRITICAL cognexa-web:${{ github.sha }}

  secret-scan:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Scan repository history for secrets
        run: |
          docker run --rm -v "${{ github.workspace }}:/repo" \
            zricethezav/gitleaks:v8.24.2 detect --source=/repo --no-banner
