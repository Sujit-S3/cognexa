name: Release Images

on:
  push:
    tags: ['v*.*.*']

permissions:
  contents: write
  packages: write
  id-token: write
  attestations: write

jobs:
  build-server:
    runs-on: ubuntu-latest
    outputs:
      digest: ${{ steps.build.outputs.digest }}
    steps:
      - uses: actions/checkout@v7
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository_owner }}/cognexa-server
          tags: |
            type=semver,pattern={{version}}
            type=sha
      - id: build
        uses: docker/build-push-action@v6
        with:
          context: .
          file: docker/server.Dockerfile
          push: true
          platforms: linux/amd64,linux/arm64
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            APP_VERSION=${{ github.ref_name }}
            COMMIT_SHA=${{ github.sha }}
          provenance: mode=max
          sbom: true
          cache-from: type=gha,scope=release-server
          cache-to: type=gha,mode=max,scope=release-server
      - uses: actions/attest-build-provenance@v2
        with:
          subject-name: ghcr.io/${{ github.repository_owner }}/cognexa-server
          subject-digest: ${{ steps.build.outputs.digest }}
          push-to-registry: true

  build-web:
    runs-on: ubuntu-latest
    outputs:
      digest: ${{ steps.build.outputs.digest }}
    steps:
      - uses: actions/checkout@v7
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository_owner }}/cognexa-web
          tags: |
            type=semver,pattern={{version}}
            type=sha
      - id: build
        uses: docker/build-push-action@v6
        with:
          context: .
          file: docker/web.Dockerfile
          push: true
          platforms: linux/amd64,linux/arm64
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            APP_VERSION=${{ github.ref_name }}
            COMMIT_SHA=${{ github.sha }}
            VITE_API_URL=/api/v1
          provenance: mode=max
          sbom: true
          cache-from: type=gha,scope=release-web
          cache-to: type=gha,mode=max,scope=release-web
      - uses: actions/attest-build-provenance@v2
        with:
          subject-name: ghcr.io/${{ github.repository_owner }}/cognexa-web
          subject-digest: ${{ steps.build.outputs.digest }}
          push-to-registry: true

  publish-release:
    needs: [build-server, build-web]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - name: Publish release notes with immutable image digests
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SERVER_DIGEST: ${{ needs.build-server.outputs.digest }}
          WEB_DIGEST: ${{ needs.build-web.outputs.digest }}
        run: |
          printf '## Immutable images\n\n- Server: `%s`\n- Web: `%s`\n' \
            "$SERVER_DIGEST" "$WEB_DIGEST" > "${RUNNER_TEMP}/release-notes.md"
          gh release create "${GITHUB_REF_NAME}" --verify-tag --generate-notes \
            --notes-file "${RUNNER_TEMP}/release-notes.md"
