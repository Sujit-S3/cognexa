apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: cognexa
spec:
  $patch: replace
  ingressClassName: nginx
  tls:
    - hosts:
        - staging.cognexa.app
        - api.staging.cognexa.app
      secretName: cognexa-staging-tls
  rules:
    - host: staging.cognexa.app
      http:
        paths:
          - path: /api
            pathType: Prefix
            backend:
              service:
                name: cognexa-server
                port:
                  name: http
          - path: /
            pathType: Prefix
            backend:
              service:
                name: cognexa-web
                port:
                  name: http
    - host: api.staging.cognexa.app
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: cognexa-server
                port:
                  name: http
