services:
  mongo:
    image: mongo:7.0
    restart: unless-stopped
    volumes:
      - cognexa-mongo:/data/db
    healthcheck:
      test: ['CMD', 'mongosh', '--quiet', '--eval', "db.adminCommand('ping').ok"]
      interval: 10s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7.4-alpine
    restart: unless-stopped
    command: ['redis-server', '--appendonly', 'yes', '--maxmemory-policy', 'noeviction']
    volumes:
      - cognexa-redis:/data
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 10s
      timeout: 5s
      retries: 10

  server:
    build:
      context: .
      dockerfile: docker/server.Dockerfile
    restart: unless-stopped
    init: true
    environment:
      NODE_ENV: production
      APP_ENV: development
      PORT: 4000
      APP_VERSION: ${APP_VERSION:-0.1.0-local}
      COMMIT_SHA: ${COMMIT_SHA:-development}
      MONGODB_ATLAS_URI: mongodb://mongo:27017/cognexa
      REDIS_URL: redis://redis:6379
      REDIS_REQUIRED: 'true'
      SECRET_KEY: ${SECRET_KEY:?Set SECRET_KEY to at least 32 random characters}
      CORS_ALLOWED_ORIGINS: ${CORS_ALLOWED_ORIGINS:-http://localhost:8080}
      CLIENT_URL: ${CLIENT_URL:-http://localhost:8080}
      COOKIE_SECURE: 'false'
      AI_SERVICE_URL: ${AI_SERVICE_URL:-}
      AI_SERVICE_API_KEY: ${AI_SERVICE_API_KEY:-}
    depends_on:
      mongo:
        condition: service_healthy
      redis:
        condition: service_healthy
    ports:
      - '4000:4000'
    healthcheck:
      test: ['CMD', 'wget', '-qO-', 'http://localhost:4000/health/ready']
      interval: 10s
      timeout: 5s
      retries: 10
    networks:
      default:
        aliases: [cognexa-server]

  web:
    build:
      context: .
      dockerfile: docker/web.Dockerfile
      args:
        VITE_API_URL: ${VITE_API_URL:-/api/v1}
    restart: unless-stopped
    init: true
    depends_on:
      server:
        condition: service_healthy
    ports:
      - '8080:8080'

volumes:
  cognexa-mongo:
  cognexa-redis:
